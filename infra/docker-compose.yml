# castleChat 앱 인프라 (모니터링 제외. 모니터링은 monitoring/ 참고)
# chatRedis : 세션 + RoomMemberCache/RoomReadPositionCache (lrm) 저장소
# chatKafka : sendMessage durable save용 kafka 브로커 (KRaft 단일 노드. Zookeeper 불필요)
services:
  chatRedis:
    image: redis:7
    container_name: castle-redis

    ports:
      - "6379:6379"

    volumes:
      - chatredis-data:/data

    mem_limit: 256m

  chatKafka:
    image: apache/kafka:3.9.0
    container_name: castle-chatKafka

    ports:
      - "9094:9094"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@chatKafka:9093
      KAFKA_LISTENERS: INTERNAL://chatKafka:9092,CONTROLLER://chatKafka:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://chatKafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

    volumes:
      - chatkafka-data:/var/lib/kafka/data

    mem_limit: 768m

volumes:
  chatkafka-data:
  chatredis-data:
