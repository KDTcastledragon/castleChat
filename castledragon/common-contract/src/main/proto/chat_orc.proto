syntax = "proto3"; //  protobuf 문법 버전

option java_multiple_files = true; // 생성 Java class를 여러 파일로 나눔
option java_package = "com.chat.contract.grpc"; // 생성 Java class package
option java_outer_classname = "ChatOrcProto";

// gRPC API 묶음

service ChatOrc {
  rpc CreateChatMessage (CreateChatMessageRequest) returns (CreateChatMessageResponse);/ 원격 호출 가능한 메소드. Remote Procedure Call.
  rpc ReadChatMessage (ReadChatMessageRequest) returns (ReadChatMessageResponse);

  rpc DeleteChatMessage (DeleteChatMessageRequest) returns (DeleteChatMessageResponse);
  rpc ReactChatMessage (ReactChatMessageRequest) returns (ReactChatMessageResponse);
  rpc PinChatMessage (PinChatMessageRequest) returns (PinChatMessageResponse);
}

// 요청 데이터 구조
message CreateChatMessageRequest {
  int64 room_id = 1;
  int64 sender_user_id = 2;
  string sender_public_id = 3;
  string message_text = 4;

  string message_type = 5;
  repeated int64 attachment_ids = 6;
  optional int64 reply_to_message_id = 7;
}

message ChatAttachment {
  int64 attachment_id = 1;
  int64 message_id = 2;
  int64 room_id = 3;
  int64 uploader_user_id = 4;

  string file_url = 5;
  string original_file_name = 6;
  string content_type = 7;
  int64 file_size = 8;

  string attachment_kind = 9;
  string attachment_status = 10;

  int32 width = 11;
  int32 height = 12;
  int64 duration_ms = 13;

  int32 sort_order = 14;
}

message CreateChatMessageResponse {
  int64 message_id = 1;
  int64 room_id = 2;
  string sender_public_id = 3;
  string message_text = 4;
  string created_at = 5;
  int64 unread_count = 6;

  string message_type = 7;
  int64 reply_to_message_id = 8;
  repeated ChatAttachment attachments = 9;
}

message ReadChatMessageRequest {
  int64 room_id = 1;
  int64 reader_user_id = 2;
  string reader_public_id = 3;
  int64 last_read_message_id = 4;
}

message ReadChatMessageResponse {
  int64 room_id = 1;
  string reader_public_id = 2;
  int64 old_last_read_message_id = 3;
  int64 last_read_message_id = 4;
  bool updated = 5;
}



