syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.chat.contract.grpc";
option java_outer_classname = "ChEngineProto";

service ChEngineChat {
  rpc StartDirectChat (StartDirectChatRequest) returns (CreateChatMessageResponse);
  rpc StartGroupChat (StartGroupChatRequest) returns (CreateChatMessageResponse);

  rpc CreateChatMessage (CreateChatMessageRequest) returns (CreateChatMessageResponse);
  rpc ReadChatMessage (ReadChatMessageRequest) returns (ReadChatMessageResponse);
  rpc DeleteChatMessage (DeleteChatMessageRequest) returns (DeleteChatMessageResponse);
  
  rpc ReactChatMessage (ReactChatMessageRequest) returns (ReactChatMessageResponse);
}

service ChEngineRoom {
  rpc OpenDirectChatRoom (OpenDirectChatRoomRequest) returns (EnterRoomResponse);
  
  rpc EnterRoom (EnterRoomRequest) returns (EnterRoomResponse);
  rpc LeftRoom (LeftRoomRequest) returns (RoomFeedResponse);
  
  rpc InviteMember (InviteMemberRequest) returns (RoomFeedResponse);
  rpc KickMember (KickMemberRequest) returns (RoomFeedResponse);
  rpc BanMember (BanMemberRequest) returns (RoomFeedResponse);
  rpc ChangeMemberRole (ChangeMemberRoleRequest) returns (RoomFeedResponse);

  rpc ApplyRoomNotice (ApplyRoomNoticeRequest) returns (ApplyRoomNoticeResponse);
}

service ChEngineFriend {
  rpc AddFriend (AddFriendRequest) returns (FriendEventResponse);
  rpc RespondFriend (RespondFriendRequest) returns (FriendEventResponse);
}


message ChatAttachment {
  int64 attachment_id = 1;
  int64 message_id = 2;
  int64 room_id = 3;
  int64 uploader_user_id = 4;

  string file_url = 5;
  string original_file_name = 6;
  string content_type = 7;
  int64 file_size = 8;

  string attachment_kind = 9;
  string attachment_status = 10;

  int32 width = 11;
  int32 height = 12;
  int64 duration_ms = 13;

  int32 sort_order = 14;
}

message OpenDirectChatRoomRequest {
  int64 requester_user_id = 1;
  string requester_public_id = 2;

  string friend_public_id = 3;
}

message StartDirectChatRequest {
  string target_public_id = 1;

  int64 sender_user_id = 2;
  string sender_public_id = 3;

  string message_type = 4;
  string message_text = 5;

  optional int64 reply_to_message_id = 6;
  repeated int64 attachment_ids = 7;
}

message StartGroupChatRequest {
  string room_name = 1;
  string room_thumbnail = 2;

  repeated string invite_member_public_ids = 4;

  int64 sender_user_id = 5;
  string sender_public_id = 6;

  string message_type = 7;
  string message_text = 8;

  optional int64 reply_to_message_id = 9;
  repeated int64 attachment_ids = 10;
}

message CreateChatMessageRequest {
  int64 room_id = 1;
  int64 sender_user_id = 2;
  string sender_public_id = 3;

  string message_type = 4;
  string message_text = 5;

  optional int64 reply_to_message_id = 6;
  repeated int64 attachment_ids = 7;
}

message CreateChatMessageResponse {
  int64 message_id = 1;
  int64 room_id = 2;
  string sender_public_id = 3;

  string message_type = 4;
  string message_text = 5;

  optional int64 reply_to_message_id = 6;

  string created_at = 7;
  int64 unread_count = 8;

  repeated ChatAttachment attachments = 9;
}

message ReadChatMessageRequest {
  int64 room_id = 1;
  int64 reader_user_id = 2;
  string reader_public_id = 3;
  int64 last_read_message_id = 4;
}

message ReadChatMessageResponse {
  int64 room_id = 1;
  string reader_public_id = 2;
  int64 old_last_read_message_id = 3;
  int64 last_read_message_id = 4;
  bool updated = 5;
}

message DeleteChatMessageRequest {
  int64 room_id = 1;
  int64 message_id = 2;

  int64 requester_user_id = 3;
  string requester_public_id = 4;
}

message DeleteChatMessageResponse {
  int64 room_id = 1;
  int64 message_id = 2;

  string requester_public_id = 3;

  string message_status = 4;
  string deleted_at = 5;
}

message ReactChatMessageRequest {
  int64 room_id = 1;
  int64 message_id = 2;

  int64 requester_user_id = 3;
  string requester_public_id = 4;

  string reaction_type = 5;
  string reaction_code = 6;

  bool add_requested = 7;
}

message ReactChatMessageResponse {
  int64 room_id = 1;
  int64 message_id = 2;

  string requester_public_id = 3;

  string reaction_type = 4;
  string reaction_code = 5;

  bool added = 6;
  string reacted_at = 7;
}

message RoomMemberProfile {
  string public_id = 1;
  string nickname = 2;
  string friend_code = 3;
  string profile_img = 4;
  string role = 5;
}

message RoomNoticeView {
  int64 room_notice_id = 1;
  int64 room_id = 2;

  string room_notice_action = 3;
  string room_notice_type = 4;
  string room_notice_contents = 5;
  string room_notice_status = 6;

  string requester_public_id = 7;
  string last_applied_at = 8;
}

message EnterRoomResponse {
  int64 room_id = 1;
  string room_type = 2;
  string room_name = 3;
  string room_thumbnail = 4;

  int64 room_member_count = 5;
  repeated RoomMemberProfile member_list = 6;

  optional RoomNoticeView active_room_notice = 7;

  string room_background = 8;
}

message EnterRoomRequest {
  int64 room_id = 1;
  int64 requester_user_id = 2;
  string requester_public_id = 3;
}

message LeftRoomRequest {
  int64 room_id = 1;
  int64 requester_user_id = 2;
  string requester_public_id = 3;
}

message InviteMemberRequest {
  int64 room_id = 1;

  int64 requester_user_id = 2;
  string requester_public_id = 3;

  repeated string invite_member_public_ids = 4;
}

message KickMemberRequest {
  int64 room_id = 1;

  int64 requester_user_id = 2;
  string requester_public_id = 3;

  string kick_target_public_id = 4;
}

message BanMemberRequest {
  int64 room_id = 1;

  int64 requester_user_id = 2;
  string requester_public_id = 3;

  string ban_target_public_id = 4;
}
message ChangeMemberRoleRequest {
  int64 room_id = 1;

  int64 requester_user_id = 2;
  string requester_public_id = 3;

  string target_public_id = 4;
  string target_role = 5;
}

message RoomFeedResponse {
  int64 room_id = 1;

  string feed_type = 2;

  string requester_public_id = 3;
  string requester_nickname = 4;

  repeated string target_public_ids = 5;
  repeated string target_nicknames = 6;

  string feed_text = 7;
  string feed_at = 8;
}

message ApplyRoomNoticeRequest {
  int64 room_id = 1;

  string room_notice_action = 2;
  optional int64 target_room_notice_id = 3;

  string room_notice_type = 4;
  optional int64 source_message_id = 5;
  string room_notice_contents = 6;

  int64 requester_user_id = 7;
  string requester_public_id = 8;
}

message ApplyRoomNoticeResponse {
  RoomNoticeView room_notice_view = 1;
  RoomFeedResponse room_feed = 2;
}

message AddFriendRequest {
  int64 requester_user_id = 1;
  string requester_public_id = 2;

  string target_public_id = 3;
}

message RespondFriendRequest {
  int64 responder_user_id = 1;
  string responder_public_id = 2;

  string requester_public_id = 3;
  string friend_action = 4;
}

message FriendEventResponse {
  string friend_event_type = 1;

  int64 requester_user_id = 2;
  string requester_public_id = 3;

  int64 target_user_id = 4;
  string target_public_id = 5;

  string friend_status = 6;
  string event_at = 7;
}