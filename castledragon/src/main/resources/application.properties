spring.application.name=castledragon
spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/castle_chat_db?useSSL=false&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=tjdfyd0817
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA 비활성화
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# MyBatis 설정 (필요시)
mybatis.mapper-locations=classpath:mappers/*.xml
#mybatis.config-location=classpath:/mybatis-config.xml

# snake_case -> camelCase 자동 매핑
mybatis.configuration.map-underscore-to-camel-case=true

# redis 설정
spring.session.store-type=redis
spring.session.redis.namespace=castlechat:session
server.servlet.session.timeout=30m

# Spring Boot 시작 시 auto-configuration이 다음 조건을 확인한다.
# Servlet web application인가?
# Spring Session class가 classpath에 있는가?
# RedisConnectionFactory가 있는가?
# Session store type이 redis인가?

# 조건이 맞으면 대략 다음 Bean을 자동 생성한다.
# RedisConnectionFactory
# RedisTemplate/RedisOperations
# RedisSessionRepository
# SessionRepositoryFilter
# CookieHttpSessionIdResolver

# ▶따라서 직접 @EnableRedisHttpSession을 작성하지 않아도 된다.

# HTTP 요청이 Controller에 도착하기 전에 Spring이 자동 등록한 Filter가 실행된다.
# Tomcat → SessionRepositoryFilter → Spring DispatcherServlet → UserController

# 이 Filter는 원본 HttpServletRequest를 wrapper로 감싼다.
# Tomcat HttpServletRequest → SessionRepositoryRequestWrapper
# 이후 Controller가 받는 HttpSession은 겉으로는 Servlet 표준 HttpSession이지만,, 내부 동작은 Spring Session Repository로 연결된다.

#추후 배포시 true로 변경.
server.servlet.session.cookie.secure=false

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ===== Actuator / Prometheus =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# 1-1. health : 서버 살아있는지 확인
# 1-2. info : 앱 정보
# 1-3. metrics : metric 목록 확인
# 1-4. prometheus : Prometheus가 긁어갈 metric text endpoint
# 2. show-details=always : health에서 DB/Redis 같은 상세 상태도 보여주기
# 3. management.prometheus.metrics.export.enabled=true : Prometheus 형식 metric export 활성화



