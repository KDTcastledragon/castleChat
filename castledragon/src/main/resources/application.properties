spring.application.name=castledragon
spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/castle_chat_db?useSSL=false&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=tjdfyd0817
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA 비활성화
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# MyBatis 설정 (필요시)
mybatis.mapper-locations=classpath:mappers/*.xml
#mybatis.config-location=classpath:/mybatis-config.xml

# snake_case -> camelCase 자동 매핑
mybatis.configuration.map-underscore-to-camel-case=true

spring.session.store-type=redis
spring.session.redis.namespace=castlechat:session
server.servlet.session.timeout=30m

#추후 배포시 true로 변경.
server.servlet.session.cookie.secure=false

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ===== Actuator / Prometheus =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# 1-1. health : 서버 살아있는지 확인
# 1-2. info : 앱 정보
# 1-3. metrics : metric 목록 확인
# 1-4. prometheus : Prometheus가 긁어갈 metric text endpoint
# 2. show-details=always : health에서 DB/Redis 같은 상세 상태도 보여주기
# 3. management.prometheus.metrics.export.enabled=true : Prometheus 형식 metric export 활성화



