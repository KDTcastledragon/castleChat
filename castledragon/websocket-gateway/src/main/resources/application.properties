spring.application.name=websocket-gateway
server.port=8090

# MariaDB
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/castle_chat_db?useSSL=false&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=tjdfyd0817

# MyBatis 설정 (필요시)
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
# snake_case -> camelCase 자동 매핑.
#mybatis.config-location=classpath:/mybatis-config.xml

# redis 설정
spring.session.store-type=redis
spring.session.redis.namespace=castlechat:session
server.servlet.session.cookie.name=CASTLECHAT_SESSION
server.servlet.session.timeout=30m

spring.data.redis.host=localhost
spring.data.redis.port=6379

# Internal service URL ??????????????????????????????????????????????????????
chat.orchestrator.base-url=http://localhost:9100

# WebSocket Gateway identity ?????????????????????????????????????????????????????
ws.gateway.id=ws-gateway-local-1

#추후 배포시 true로 변경.
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ===== Actuator / Prometheus =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# gRPC
grpc.client.chat-orchestrator.address=static://localhost:9091
grpc.client.chat-orchestrator.negotiation-type=plaintext

