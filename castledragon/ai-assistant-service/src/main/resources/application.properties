spring.application.name=ai-assistant-service
server.port=9200

# MariaDB (메시지 히스토리 read-only 조회용)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/castle_chat_db?useSSL=false&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=tjdfyd0817

# MyBatis 설정
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# redis 세션 공유 : 다른 서비스와 동일한 namespace/cookie -> 기존 로그인 세션 그대로 인증에 사용.
spring.session.store-type=redis
spring.session.redis.namespace=castlechat:session
server.servlet.session.cookie.name=CASTLECHAT_SESSION
server.servlet.session.timeout=30m

spring.data.redis.host=localhost
spring.data.redis.port=6379

#추후 배포시 true로 변경.
server.servlet.session.cookie.secure=false

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ===== Kafka (현재 미사용. 추후 AI 이벤트 consumer가 필요하면 사용) =====
spring.kafka.bootstrap-servers=localhost:9094
# consumer 상세 설정은 실제 AI 비동기 이벤트 구현 단계에서 추가.

# ===== Gemini API =====
# api key는 https://aistudio.google.com 에서 발급. 절대 git에 커밋하지 말 것.
# local env는 castleApiKey를 우선 사용한다. 기존 GEMINI_API_KEY도 fallback으로 허용.
ai.gemini.api-key=${castleApiKey:${GEMINI_API_KEY:}}
ai.gemini.model=gemini-3.5-flash

# ===== AI Assist Rate Limit =====
# 테스트 기간에는 제한 없이 Gemini 연동을 검증한다.
# 완성본에서는 아래 제한값을 복구한다.
# ai.assist.rate-limit.user-per-minute=1
# ai.assist.rate-limit.user-per-day=5
# ai.assist.rate-limit.global-per-minute=5
# ai.assist.rate-limit.global-per-day=80

# ===== Actuator / Prometheus =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# ANSI 로그 출력 차단. --> [0;39m [2m:[0;39m
spring.output.ansi.enabled=never
